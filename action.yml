name: "Fast Forward Composite Action"
description: "Fast forward the target branch from a pull request."
author: "Lunei Solei"
inputs:
    app_client_id:
      description: 'GitHub Client ID'
      required: false
    app_private_key:
      description: 'GitHub App Private Key'
      required: false
    github_token:
        required: true
        description: "The GitHub token for this action to use."
    auto_merge:
        required: true
        description: >
            "Boolean that determines if the target branch should be automatically
            fast forwarded after determining that a pull request is eligible to do so."
    comment:
        required: true
        description: >
            "always" - Posts a comment to the pull request indicating whether
            it is possible to fast-forward the target branch, and, if merge 
            is true, whether fast forwarding succeeded.
            
            "on-error" - A comment is only posted if an error occurs.
            
            "never" - No comment is posted. The comment is still available 
            via the comment output variable and in the step's summary.
        default: "on-error"
    custom_command:
        required: true
        description: >
            "The command to be used to trigger the bot."
        default: "/fast-forward"

runs:
    using: node24
    main: dist/index.js
